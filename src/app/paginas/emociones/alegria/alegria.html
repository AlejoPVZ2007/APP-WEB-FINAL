<canvas #canvasLluvia id="lluvia"></canvas>



<div class="container mt-5">
  <div class="text-center mb-4">
    <h1>¿Tienes alegría?</h1>
    <p>Compártenos lo que sientes hoy</p>
  </div>

  <!-- FORMULARIO -->
  <div class="card mb-4 shadow">
    <div class="card-body">
      <form (submit)="publicar($event)">
        <textarea class="form-control"
          rows="3"
          [(ngModel)]="mensaje"
          name="mensaje"
          placeholder="Escribe lo que sientes…"></textarea>

        <button class="btn btn-warning mt-2">Publicar</button>
      </form>
    </div>
  </div>

  <!-- COMENTARIOS -->
  <h4>Comentarios recientes</h4>
  <div *ngFor="let c of comentarios" class="card mb-3 shadow-sm">
    <div class="card-body">
      <h6 class="fw-bold">{{c.usuario}}</h6>
      <p>{{c.texto}}</p>
      <small class="text-muted">{{c.tiempo}}</small>
    </div>
  </div>
</div>

<!-- FRASES -->
<div class="container my-4">
  <h4 class="text-center text-primary">Frases del Día</h4>

  <div class="row">
    <div class="col-md-4 mb-3" *ngFor="let f of frases">
      <div class="card bg-light shadow-sm">
        <div class="card-body">
          <p>{{f}}</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- AUDIO -->
<audio #audioFondo loop>
  <source src="assets/audio.mp3" type="audio/mpeg">
</audio>
