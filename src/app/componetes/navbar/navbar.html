<!-- ================================================================
     NAVBAR — app-navbar
================================================================ -->
<nav id="mainNav"
     class="navbar navbar-expand-lg bg-dark"
     aria-label="Navegación principal"
     [class.scrolled]="navScrolled">

  <div class="container nav-wrap">

    <!-- MARCA -->
    <a class="nav-brand" routerLink="/inicio" aria-label="Inicio">
      <div class="brand-emblem" aria-hidden="true">
        <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect width="40" height="40" rx="10" fill="#c9922a"/>
          <path d="M20 8c-2 5-8 7-8 13a8 8 0 0016 0c0-6-6-8-8-13z" fill="#080808"/>
          <circle cx="20" cy="21" r="3" fill="#e8b555"/>
        </svg>
      </div>
      <div class="brand-label">
        <span class="brand-sup">Viaja por</span>
        <span class="brand-main">Tus Emociones</span>
      </div>
    </a>

    <!-- TOGGLER -->
    <button class="nav-toggler"
            type="button"
            data-bs-toggle="collapse"
            data-bs-target="#navMenu"
            aria-controls="navMenu"
            aria-expanded="false"
            aria-label="Abrir menú"
            (click)="toggleMenu()">
      <span class="tbar" [class.open]="menuAbierto"></span>
      <span class="tbar" [class.open]="menuAbierto"></span>
      <span class="tbar" [class.open]="menuAbierto"></span>
    </button>

    <!-- MENÚ -->
    <div class="collapse navbar-collapse" id="navMenu">
      <ul class="nav-links ms-auto" role="list">
        <li role="listitem">
          <a class="nav-link-item"
             routerLink="/"
             routerLinkActive="activo"
             [routerLinkActiveOptions]="{exact:true}">
            Inicio
          </a>
        </li>
        <li role="listitem">
          <a class="nav-link-item"
             routerLink="/emociones"
             routerLinkActive="activo">
            Emociones
          </a>
        </li>
        <li role="listitem">
          <a class="nav-link-item"
             routerLink="/nosotros"
             routerLinkActive="activo">
            Nosotros
          </a>
        </li>
      </ul>

      <!-- BUSCADOR -->
      <form class="nav-search" role="search" (submit)="buscar($event)">
        <label for="navSearch" class="visually-hidden">¿Cómo te sientes hoy?</label>
        <input id="navSearch"
                class="nav-search-input"
                type="search"
                placeholder="¿Cómo te sientes hoy?"
                autocomplete="off"
                (focus)="searchFocus=true"
                (blur)="searchFocus=false"
                (keydown.enter)="buscar($event)"
                [class.focused]="searchFocus">
        <button class="nav-search-btn" type="submit" aria-label="Buscar">
          <svg width="15" height="15" viewBox="0 0 24 24"
               fill="none" stroke="currentColor"
               stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/>
            <path d="m21 21-4.35-4.35"/>
          </svg>
        </button>
      </form>
    </div>

  </div>

  <!-- BARRA PROGRESO SCROLL -->
  <div class="nav-progress" [style.width.%]="scrollPct" aria-hidden="true"></div>

</nav>
