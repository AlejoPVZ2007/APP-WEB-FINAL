<!-- ===================================================
HERO / CAROUSEL
=================================================== -->

<section class="hero-section">

  <div id="carouselE1"
       class="carousel slide carousel-fade"
       data-bs-ride="carousel"
       data-bs-interval="5000">

    <div class="carousel-inner">

      <div class="carousel-item active">
        <img src="assets/images/Miedo1.jpg"
             class="carousel-img"
             alt="Miedo">
      </div>

      <div class="carousel-item">
        <img src="assets/images/Nostalgia1.jpeg"
             class="carousel-img"
             alt="Nostalgia">
      </div>

      <div class="carousel-item">
        <img src="assets/images/Foto1.jpg"
             class="carousel-img"
             alt="Ira">
      </div>

    </div>

    <!-- Flechas -->

    <button class="carousel-control-prev"
            type="button"
            data-bs-target="#carouselE1"
            data-bs-slide="prev">

      <span class="carousel-control-prev-icon"></span>

    </button>

    <button class="carousel-control-next"
            type="button"
            data-bs-target="#carouselE1"
            data-bs-slide="next">

      <span class="carousel-control-next-icon"></span>

    </button>

  </div>

</section>



<!-- ===================================================
CARDS DE EMOCIONES
=================================================== -->

<section class="cards-section">

  <div class="container">

    <div class="row g-4">

      <div class="col-md-4"
           *ngFor="let em of emocionesPaginadas">

        <div class="card"
             (click)="abrirModal(em)"
             style="cursor:pointer">

          <img [src]="em.imagen"
               class="card-img-top"
               [alt]="em.alt">

          <div class="card-body">

            <h5 class="card-title">
              {{ em.titulo }} {{ em.emoji }}
            </h5>

            <p class="card-text">
              {{ em.texto }}
            </p>

          </div>

        </div>

      </div>

    </div>


    <!-- ===================================================
    PAGINACIÓN
    =================================================== -->

    <nav class="mt-4">

      <ul class="pagination justify-content-center">

        <!-- Anterior -->

        <li class="page-item"
            [class.disabled]="paginaActual === 1">

          <a class="page-link"
             (click)="cambiarPagina(paginaActual - 1)">
             Anterior
          </a>

        </li>


        <!-- Numeros -->

        <li class="page-item"
            *ngFor="let i of [].constructor(totalPaginas); let idx = index"
            [class.active]="paginaActual === idx+1">

          <a class="page-link"
             (click)="cambiarPagina(idx+1)">
             {{ idx + 1 }}
          </a>

        </li>


        <!-- Siguiente -->

        <li class="page-item"
            [class.disabled]="paginaActual === totalPaginas">

          <a class="page-link"
             (click)="cambiarPagina(paginaActual + 1)">
             Siguiente
          </a>

        </li>

      </ul>

    </nav>

  </div>

</section>



<!-- ===================================================
MODAL EMOCIÓN
=================================================== -->

<div class="modal fade"
     id="emocionModal"
     tabindex="-1"
     aria-labelledby="emocionModalTitle"
     aria-hidden="true">

  <div class="modal-dialog modal-dialog-centered">

    <div class="modal-content">

      <div class="modal-header">

        <h5 class="modal-title"
            id="emocionModalTitle">

            {{ emocionSeleccionada?.titulo }}

        </h5>

        <button type="button"
                class="btn-close"
                data-bs-dismiss="modal">
        </button>

      </div>


      <div class="modal-body">

        <img [src]="emocionSeleccionada?.imagen"
             class="img-fluid mb-3"
             [alt]="emocionSeleccionada?.alt">

        <p>
          {{ emocionSeleccionada?.detalle }}
        </p>

      </div>


      <div class="modal-footer">
        <!-- Botón para redirigir a la página de la emoción -->
        <div class="modal-footer-custom">
          <button type="button" class="btn-modal-close" (click)="redirigirPagina()">Ir a la página</button>
          <button class="btn btn-secondary" data-bs-dismiss="modal">Cerrar</button>
        </div>
      </div>

    </div>

  </div>

</div>
